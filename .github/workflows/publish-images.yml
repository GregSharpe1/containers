name: Publish Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed images
        id: detect
        shell: bash
        run: |
          if [ '${{ github.event_name }}' = 'workflow_dispatch' ]; then
            matrix="$(FORCE_ALL=true bash scripts/detect-changed-images.sh)"
          else
            matrix="$(BASE_SHA='${{ github.event.before }}' HEAD_SHA='${{ github.sha }}' bash scripts/detect-changed-images.sh)"
          fi

          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

          if [ "$matrix" = '{"include":[]}' ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Load image metadata
        id: config
        shell: bash
        run: |
          IMAGE_NAME=''
          IMAGE_DESCRIPTION=''
          IMAGE_PLATFORMS=''

          while IFS='=' read -r key value; do
            [ -n "$key" ] || continue

            case "$key" in
              IMAGE_NAME)
                IMAGE_NAME="$value"
                ;;
              IMAGE_DESCRIPTION)
                IMAGE_DESCRIPTION="$value"
                ;;
              IMAGE_PLATFORMS)
                IMAGE_PLATFORMS="$value"
                ;;
            esac
          done < '${{ matrix.context }}/metadata.env'

          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_description=${IMAGE_DESCRIPTION}" >> "$GITHUB_OUTPUT"
          echo "image_platforms=${IMAGE_PLATFORMS}" >> "$GITHUB_OUTPUT"
          echo "registry_owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.config.outputs.registry_owner }}/${{ steps.config.outputs.image_name }}
          tags: |
            type=sha,format=short,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.description=${{ steps.config.outputs.image_description }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          file: ./${{ matrix.context }}/Dockerfile
          platforms: ${{ steps.config.outputs.image_platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
